<!DOCTYPE html>
<html>
<head>
    <title>Heartline — Where Real Connections Begin</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
        body{background:#000;color:#fff;min-height:100vh}
   .hidden{display:none}
   .container{max-width:400px;margin:0 auto;padding:20px}
   .logo{font-size:32px;font-weight:800;text-align:center;margin:40px 0;background:linear-gradient(45deg,#ff3b5c,#ff8a00);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
        input,textarea,select{width:100%;padding:15px;margin:10px 0;background:#1a1a1a;border:1px solid #333;border-radius:12px;color:#fff;font-size:16px}
        button{width:100%;padding:18px;background:linear-gradient(45deg,#ff3b5c,#ff8a00);border:none;border-radius:12px;color:#fff;font-size:18px;font-weight:700;margin:15px 0;cursor:pointer}
        button:disabled{opacity:0.5}
   .card{background:#1a1a1a;border-radius:20px;padding:20px;margin:15px 0;border:1px solid #333}
   .profile-pic{width:100%;height:300px;object-fit:cover;border-radius:16px;margin:10px 0}
   .btn-row{display:flex;gap:10px}
   .btn-like{flex:1;background:#25D366}
   .btn-pass{flex:1;background:#666}
        #loading{text-align:center;padding:50px}
    </style>
</head>
<body>
    <div id="loading"><div class="logo">Heartline</div><p>Connecting to database...</p></div>
    
    <div id="auth" class="hidden container">
        <div class="logo">Heartline</div>
        <h2 style="text-align:center;margin-bottom:30px">Find Your Person</h2>
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <button onclick="signup()">Sign Up</button>
        <button onclick="login()" style="background:#333">Log In</button>
    </div>

    <div id="profile" class="hidden container">
        <div class="logo">Heartline</div>
        <h3>Create Your Profile</h3>
        <input id="name" placeholder="First Name">
        <input id="age" type="number" placeholder="Age" min="18">
        <select id="gender"><option value="">Gender</option><option>Male</option><option>Female</option></select>
        <textarea id="bio" placeholder="Bio — What makes you unique?"></textarea>
        <input id="photo" type="file" accept="image/*">
        <button onclick="saveProfile()">Save & Start Matching</button>
    </div>

    <div id="app" class="hidden container">
        <div class="logo">Heartline</div>
        <div id="matchCard" class="card"></div>
        <div class="btn-row">
            <button class="btn-pass" onclick="pass()">Pass</button>
            <button class="btn-like" onclick="like()">Like ❤️</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
    import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js';
    import { getFirestore, doc, setDoc, getDoc, collection, getDocs, addDoc } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js';
    import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js';

    const firebaseConfig = {
        apiKey: "AIzaSyCPwUG0Cjjrd0DsbiyBYhF3qcKefTpWGR0",
        authDomain: "heartline-a371d.firebaseapp.com",
        projectId: "heartline-a371d",
        storageBucket: "heartline-a371d.firebasestorage.app",
        messagingSenderId: "230833188703",
        appId: "1:230833188703:web:c00ae92dd6755ca62590ea"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const storage = getStorage(app);
    
    let currentUser = null;
    let currentMatch = null;

    onAuthStateChanged(auth, async (user) => {
        document.getElementById('loading').classList.add('hidden');
        if (user) {
            currentUser = user;
            const profile = await getDoc(doc(db, 'users', user.uid));
            if (profile.exists()) {
                showApp();
                loadNextMatch();
            } else {
                showProfile();
            }
        } else {
            showAuth();
        }
    });

    window.signup = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try {
            await createUserWithEmailAndPassword(auth, email, password);
        } catch (e) { alert(e.message); }
    };

    window.login = async () => {
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        try {
            await signInWithEmailAndPassword(auth, email, password);
        } catch (e) { alert(e.message); }
    };

    window.saveProfile = async () => {
        const name = document.getElementById('name').value;
        const age = document.getElementById('age').value;
        const gender = document.getElementById('gender').value;
        const bio = document.getElementById('bio').value;
        const file = document.getElementById('photo').files[0];
        
       // if (!name ||!age ||!gender ||!bio ||!file) 
       // return alert('Fill all fields + upload photo');
        // }
        // const photoRef = ref(storage, `photos/${currentUser.uid}`);
        // await uploadBytes(photoRef, file);
        // const "" = await getDownloadURL(photoRef);
        
        await setDoc(doc(db, 'users', currentUser.uid), {
            name, age: parseInt(age), gender, bio, photoURL:"",
            email: currentUser.email,
            createdAt: new Date().toISOString()
        });
        
        showApp();
        loadNextMatch();
    };

    async function loadNextMatch() {
        const users = await getDocs(collection(db, 'users'));
        const allUsers = users.docs.map(d => ({id: d.id,...d.data()})).filter(u => u.id!== currentUser.uid);
        if (allUsers.length === 0) {
            document.getElementById('matchCard').innerHTML = '<p style="text-align:center">No more profiles. Invite friends!</p>';
            return;
        }
        currentMatch = allUsers[Math.floor(Math.random() * allUsers.length)];
        document.getElementById('matchCard').innerHTML = `
            <img src="${currentMatch.photoURL}" class="profile-pic">
            <h3>${currentMatch.name}, ${currentMatch.age}</h3>
            <p>${currentMatch.bio}</p>
        `;
    }

    window.like = async () => {
        if (!currentMatch) return;
        await addDoc(collection(db, 'likes'), {
            from: currentUser.uid,
            to: currentMatch.id,
            timestamp: new Date().toISOString()
        });
        loadNextMatch();
    };

    window.pass = () => loadNextMatch();

    function showAuth() {
        document.getElementById('auth').classList.remove('hidden');
        document.getElementById('profile').classList.add('hidden');
        document.getElementById('app').classList.add('hidden');
    }
    function showProfile() {
        document.getElementById('auth').classList.add('hidden');
        document.getElementById('profile').classList.remove('hidden');
        document.getElementById('app').classList.add('hidden');
    }
    function showApp() {
        document.getElementById('auth').classList.add('hidden');
        document.getElementById('profile').classList.add('hidden');
        document.getElementById('app').classList.remove('hidden');
    }
</script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  
  const firebaseConfig = {
    apiKey: "AIzaSyCPwUG0Cjjrd0D...",
    authDomain: "heartline-a371d.firebaseapp.com",
    projectId: "heartline-a371d",
    storageBucket: "heartline-a371d.appspot.com",
    messagingSenderId: "230833188703",
    appId: "1:230833188703:web:c00ae92dd6755ca62590ea"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  window.auth = auth;
</script>
</body>
</html>
